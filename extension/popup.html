<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; background: #fafafa; }
    h2 { font-size: 16px; margin-top: 0; color: #333; }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; }
    input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 12px; }
    button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #0056b3; }
    .status { font-size: 10px; text-align: center; margin-top: 8px; color: green; display: none; }
  </style>
</head>
<body>
  <h2>Configurações CellManager</h2>
  <div class="field">
    <label>URL do Supabase</label>
    <input type="text" id="url" placeholder="https://xyz.supabase.co">
  </div>
  <div class="field">
    <label>Chave de API (Anon/Service)</label>
    <input type="password" id="key" placeholder="eyJhbGciOiJIUzI1NiI...">
  </div>
  <button id="save">Salvar Configurações</button>
  <div id="status" class="status">Configurações salvas!</div>
  <script src="popup.js"></script>
</body>
</html>
