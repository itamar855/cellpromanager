<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-area">
        <h1>CellManager</h1>
        <div class="status-badge" id="crm-status">
          <span class="dot"></span> Online
        </div>
      </div>
    </header>

    <div class="glass-card main-card">
      <div class="label">LEAD ATIVO</div>
      <div class="value" id="active-lead-name">Nenhum</div>
      <div class="sub-label" id="active-lead-id">Nenhum lead sendo monitorado</div>
    </div>

    <div class="grid">
      <div class="glass-card stat">
        <div class="label">FILA</div>
        <div class="value" id="queue-count">0</div>
      </div>
      <div class="glass-card stat">
        <div class="label">SYNC</div>
        <div class="value" id="sync-count">OK</div>
      </div>
    </div>

    <div class="automation-area">
      <div class="label">ESTADO DA AUTOMAÇÃO</div>
      <div class="status-msg" id="automation-status">Aguardando comando do CRM...</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <footer>
      <button id="open-whatsapp" class="btn-primary">Abrir WhatsApp Web</button>
      <p class="version">CellManager CRM Extension v9.0 "Auto-Sync"</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
